basePath: /
definitions:
  handlers.CreateEmployeeInput:
    properties:
      department_id:
        type: integer
      firstname:
        type: string
      lastname:
        type: string
    required:
    - firstname
    - lastname
    type: object
  handlers.CreateTodoInput:
    properties:
      completed:
        type: boolean
      title:
        type: string
    required:
    - title
    type: object
  handlers.SearchEmpInDepartmentInput:
    properties:
      name:
        type: string
    type: object
  handlers.SearchEmpInput:
    properties:
      firstname:
        type: string
      lastname:
        type: string
      name:
        type: string
    type: object
  handlers.UpdateEmpInput:
    properties:
      department_id:
        type: integer
      firstname:
        type: string
      id:
        type: integer
      lastname:
        type: string
    type: object
  handlers.UpdateTodoInput:
    properties:
      completed:
        type: boolean
      title:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@example.com
    name: API Support
  description: This is a training API using Gin + GORM + PostgreSQL
  license:
    name: MIT
  title: Go Training API
  version: "1.0"
paths:
  /create_employee:
    post:
      consumes:
      - application/json
      description: Create a new emp
      parameters:
      - description: Employee payload
        in: body
        name: create_emp
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateEmployeeInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create emp
      tags:
      - employees
  /employee_count:
    post:
      consumes:
      - application/json
      description: Get employee count per department with optional filter
      parameters:
      - description: Department filter
        in: body
        name: search_emp
        schema:
          $ref: '#/definitions/handlers.SearchEmpInDepartmentInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Count emp in department
      tags:
      - employees
  /search_employee:
    post:
      consumes:
      - application/json
      description: Search a emp
      parameters:
      - description: Employee payload
        in: body
        name: search_emp
        required: true
        schema:
          $ref: '#/definitions/handlers.SearchEmpInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search emp
      tags:
      - employees
  /todos:
    get:
      description: Retrieve all todo items
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all todos
      tags:
      - todos
    post:
      consumes:
      - application/json
      description: Create a new todo
      parameters:
      - description: Todo payload
        in: body
        name: todo
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateTodoInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create todo
      tags:
      - todos
  /todos/{id}:
    delete:
      description: Delete a todo by ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete todo
      tags:
      - todos
    get:
      description: Retrieve a single todo by ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get todo by ID
      tags:
      - todos
    put:
      consumes:
      - application/json
      description: Update a todo by ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update payload
        in: body
        name: todo
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateTodoInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update todo
      tags:
      - todos
  /update_employee:
    put:
      consumes:
      - application/json
      description: Update a emp by ID
      parameters:
      - description: Update payload
        in: body
        name: update_emp
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateEmpInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update emp
      tags:
      - employees
swagger: "2.0"
